 # Technology
  infantry_weapons1: "Infantry Equipment I"
  infantry_weapons1_desc: "Individual and collective small arms, as well as other elements of infantry equipment."

  improved_infantry_weapons: "Infantry Equipment II"
  improved_infantry_weapons_desc: "Individual and collective small arms, as well as other elements of infantry equipment. Includes a large number of submachine guns."

  advanced_infantry_weapons: "Infantry Equipment III"
  advanced_infantry_weapons_desc: "Individual and collective small arms, as well as other elements of infantry equipment. Includes assault rifles."

  infantry_at: "Anti-tank rifles"
  infantry_at_desc: "By equipping our infantry with anti-tank rifles, we will allow it to destroy light armored vehicles without losing mobility."

  infantry_at2: "Anti-tank rocket launchers"
  infantry_at2_desc: "In order for infantry to fight more effectively with heavy armored vehicles."
  
  night_vision_improve: "Improved Night Vision"
  night_vision_improve_desc: "Early infra-red scopes, although initially intended for use by snipers, had a limited vision range. As both portability and vision improves, these devices can be used by more troops operating at night."
  
  sp_land_night_vision: "Night Vision"
  sp_land_night_vision_desc: "Being able to see the enemy without being seen is key to night operations. With the invention of infra-red technology, we can outfit our army with devices which, though unwieldy, makes this possible."
 
 #MAREPADS
  marepads: "MAREPADs"
  marepads_desc: "A specialized missile launcher that is capable of locking onto aircraft and firing a heat-seeking missile to neutralize it. The launcher itself utilizes experimental thaumaturgically-produced components and wiring to minimize their size and weight, making it as portable as current rocket launchers."
 
 # Shotgun
  shotgun_1: "Double Barrel Shotgun"
  shotgun_2: "Pump-Action Shotgun"
  shotgun_3: "Semi-automatic Shotgun"
  shotgun_1_desc: "Short, Equipped with two barrels, and loaded with buckshot, These are perfect for close-quarters combat."
  shotgun_2_desc: "Sporting a larger Internal Magazine and birdshell, these shotguns have been nicknamed \"Trench Sweepers\" for their proficiency in clearing trenches."
  shotgun_3_desc: "Faster Fire Rate, loaded with a multitude of different shells, and a larger internal magazine.  These support weapons are cherished among Engineers."
  
 #Camo
  uniform_0: "Drab Uniform"
  uniform_0_desc: "After extensive battle-testing, our scientists have come to a surprising conclusion: Bright colors stand out like a sore thumb in a battlefield.  These darker colors should make them more descreet."
  camo_1: "Camouflage II"
  camo_1_desc: "An initial design for a uniform type to blend in even more with the environment around it.  While it's a little clunky, it does certainly show promise in certain locations"
  camo_2: "Camouflage III"
  camo_2_desc: "Alongside innovations to add comfort to our uniforms both at home and afar, we have also honed in our efforts to make an invisible soldier.  While this new line of patterns isn't perfect, it is indeed an upgrade."
  camo_3: "Camouflage IV"
  camo_3_desc: "Further testing has gotten us closer to a \"Universal\" pattern.  Despite hitting the occasional snag, we are confident this should certainly lower our casualty rate."
  camo_4: "Camouflage V"
  camo_4_desc: "As close to a universal pattern as modern science can provide, this uniform is the current pinnacle of both comfort and concealability.  Just try to find a few of our boys out there!"
  
 #Magic Weapons
 improved_weapon_magic: "Magical Rifle"
 improved_weapon_magic_desc: "Magic is inherent to most sapient life, but not everyone can harness it as a weapon. Innovative designs in firearms have led to the invention of the magic rifle, a gun that uses specially imbued crystal-based cartridges to launch devastating spells against enemies. However, sustained fire makes the rifle prone to malfunctions due to the finicky nature of magic crystals. Despite its questionable reliability, the field of magic firearms is nascent and is bound to improve on these early designs."
 advanced_weapon_magic: "Auto-Magic Rifle"
 advanced_weapon_magic_desc: "Attempts to improve the firing rate of magic firearms displayed in full force the challenges presented in using crystal-based ammunition. Self-loading magic firearms require a far larger and heavier firing mechanism than usual, making a portable magic semi-automatic rifle unwieldy. However, this line of research has produced a viable light machine gun equivalent. Despite their propensity to misfire, the suppressive and destructive firepower makes these automatic magic rifles deadly weapons."
 advanced_weapon_magic_1: "Magic LMG"
 advanced_weapon_magic_1_desc: "Breakthroughs in spell imbuements lighten the cartridges used in magic firearms, allowing a streamlining of the firing mechanism of previous designs. The new design, in turn, reduces the overall weight of the weapon, turning previous automatic magic rifles into true light machine guns. Specialised ammunition also changes the spell launched at enemy targets, making for a more effective magic LMG for most situations."
 advanced_weapon_magic_2: "Modern Magic Rifle"
 advanced_weapon_magic_2_desc: "Continued refinements in magic firearms design have finally yielded a set of practical select-fire rifles that can chamber crystal cartridges. In order to address the propensity of magic firearms suffering catastrophic failures, the overall fire rate is considerably lower than that of conventional assault rifles. However, these modern magic rifles are lightweight enough to be used on the move and are as effective as the regular service rifle."
 
 #Protection
  minimum_protective: "Early Helmets"
  minimum_protective_desc: "The minimum individual protection includes only the standard infantry helmet, their supplies, and the clothes on their back."

  uniform_1: "Upgraded Helmets"
  uniform_1_desc: "Upgraded helmets provide more ample protection from shrapnel, particularly around the ears, and back of the head"
  uniform_2: "Steel Body Shield"
  uniform_2_desc: "These may be clanky, but they provide much more protection from shrapnel and small caliber bullets."
  uniform_3: "Flak Jackets"
  uniform_3_desc: "A revolution in personal safety, these jackets are lightweight, and provide ample protection from shrapnel and very light calibers of ammunition."
  uniform_4: "Ballistic Vests"
  uniform_4_desc: "We have finally found the closest thing to a truly \"Bullet Proof Vest\", utilizing kevlar and Spectra with hard plates, we can stop even certain rifle rounds with this!"
 
 #Infantry Weapons
  prewar_weapon_1: "Breech-Loaded Rifle"
  prewar_weapon_1_desc: "Muskets of old have been largely replaced by breech-loaded rifled firearms, which use smokeless powder and can be reloaded quickly and easily."
  prewar_weapon_2: "Bolt-Action Rifle"
  prewar_weapon_2_desc: "Bolt-action rifles are replacing older designs thanks to their higher rate of fire compared to previous breech-loaders."
  improved_weapon: "Submachine Gun"
  improved_weapon_desc: "Machine guns proved to be powerful weapons but lack mobility. However, submachine guns allow soldiers to maintain high rates of fire even on the move. Newer designs make these firearms particularly effective in close-quarters combat."
  advanced_weapon: "Light Machine Gun"
  advanced_weapon_desc: "Battle rifles are specially designed to improve soldiers' firepower by utilising either semi-automatic or fully automatic fire modes. As such, battle rifles combine the stopping power and range of previous service rifles with the close-quarters efficacy of submachine guns."
  advanced_weapon_1: "Assault Rifle"
  advanced_weapon_1_desc: "A divergence from the development of battle rifles, the assault rifle mainly differentiates itself from the former by using intermediate rifle cartridges. The smaller calibre sacrifices overall range and stopping power for better weapon handling, making the assault rifle more useful in tighter combat situations. New tactics developed in tandem with this new rifle change the old infantry combat dynamics, rendering our soldiers far deadlier than those of yesteryear."
  advanced_weapon_2: "Modern Rifle"
  advanced_weapon_2_desc: "New materials, lighter weapon accessories, and better equipment layouts have significantly improved upon previous iterations of our assault and battle rifles to the point that they have supplanted older bolt-action rifles as the service weapon. Submachine guns and bolt-action rifles are now effectively specialist weapons. In contrast, the versatile high-capacity automatic rifle is used by the rank-and-file, permanently changing the nature of infantry combat."
  pistol_1: "Revolver"
  pistol_1_desc: "Six rounds, and much lighter than a rifle.  These pieces are perfect for troops in need of a lightweight, concealable weapon."
  pistol_2: "Semi-Automatic Pistol"
  pistol_2_desc: "Sporting an eight-round magazine and an impressive fire rate in the right hooves, this is a considerable upgrade from the much slower revolver."
  pistol_3: "Fully Automatic Pistol"
  pistol_3_desc: "A surprising fire rate, and extensive magazine essentially make this weapon a lighter Submachine gun."
 
 # Anti-tank
  prewar_anti_tank: "Grenades"
  prewar_anti_tank_short: "Grenades"
  prewar_anti_tank_short: "Grenades"
  prewar_anti_tank_desc: "Basic infantry anti-tank equipment developed before and during the Great War."

  regular_anti_tank: "Advanced Grenades"
  regular_anti_tank_short: "Advanced Grenades"
  regular_anti_tank_desc: "Anti-tank grenades are ideal for destroying enemy equipment at close range."

  improved_anti_tank: "Anti-tank rifles"
  improved_anti_tank_short: "AT rifles"
  improved_anti_tank_desc: "Anti-tank rifles are designed to destroy enemy equipment from a long distance."

  advanced_anti_tank: "Anti-tank rocket launchers"
  advanced_anti_tank_short: "Rocket launchers"
  advanced_anti_tank_desc: "Anti-tank rocket launchers are designed to more effectively destroy enemy equipment from a long distance using a rocket projectile."

 # Presonal Protective
  pistol_protective: "Small-caliber individual protection"
  pistol_protective_short: "Small-caliber"
  pistol_protective_desc: "Small-caliber individual protection includes an additional steel cuirass, which is able to protect a soldier from a pistol caliber."

  saper_protective: "Sapper personal protection"
  saper_protective_short: "Sapper"
  saper_protective_desc: "Sapper personal protection includes a very heavy steel cuirass capable of protecting a soldier from grenades and shrapnel."

